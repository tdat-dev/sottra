<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sottra</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-state="loading">
  <div class="pill" data-drag id="pill" title="Giữ Right Alt để nói">
    <!-- Icon mic — bấm để bật/tắt thu âm -->
    <button class="icon" id="btn-mic" data-nodrag title="Bấm để nói / dừng" aria-label="Bật tắt thu âm">
      <!-- microphone (Tabler MIT) -->
      <svg class="ic ic-mic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M9 2m0 3a3 3 0 0 1 3 -3h0a3 3 0 0 1 3 3v5a3 3 0 0 1 -3 3h0a3 3 0 0 1 -3 -3z"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      <!-- spinner -->
      <svg class="ic ic-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M12 3a9 9 0 1 0 9 9"/></svg>
      <!-- check -->
      <svg class="ic ic-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5l9 -9"/></svg>
    </button>

    <!-- Dải sóng âm -->
    <div class="wave" id="wave" data-nodrag>
      <span class="baseline"></span>
      <span class="bar"></span><span class="bar"></span><span class="bar"></span>
      <span class="bar"></span><span class="bar"></span><span class="bar"></span>
      <span class="bar"></span><span class="bar"></span><span class="bar"></span>
      <span class="bar"></span><span class="bar"></span><span class="bar"></span>
      <span class="bar"></span><span class="bar"></span><span class="bar"></span>
      <span class="bar"></span><span class="bar"></span>
    </div>

    <!-- Nút đóng (hiện khi hover) -->
    <button class="close" id="btn-close" data-nodrag title="Đóng" aria-label="Đóng">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="6" y1="18" x2="18" y2="6"/></svg>
    </button>
  </div>

  <script src="app.js"></script>
</body>
</html>
